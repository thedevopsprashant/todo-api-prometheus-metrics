version: "3.9"

services:

  # ──────────────────────────────────────────────────────────────────────────
  # MongoDB
  # ──────────────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:6
    container_name: mongo-todo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: todo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - todo-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok", "--username", "root", "--password", "password", "--authenticationDatabase", "admin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ──────────────────────────────────────────────────────────────────────────
  # todo-api (Spring Boot)
  # Build the JAR first: JAVA_HOME=$(/usr/libexec/java_home -v 17) mvn clean package -DskipTests
  # Note: Dockerfile has EXPOSE 8080 but the app binds to 8082 (application.properties).
  #       The port mapping below uses 8082:8082 to match the actual runtime port.
  # ──────────────────────────────────────────────────────────────────────────
  todo-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JAVA_VERSION: "11-jdk-jammy"
    image: todo-api:1.0.0
    container_name: todo-api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      # Override the localhost URI in application.properties with the mongo service hostname
      SPRING_DATA_MONGODB_URI: mongodb://root:password@mongo:27017/todo?authSource=admin
      SERVER_PORT: 8082
    networks:
      - todo-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

# ──────────────────────────────────────────────────────────────────────────
# Volumes
# ──────────────────────────────────────────────────────────────────────────
volumes:
  mongo-data:
    driver: local

# ──────────────────────────────────────────────────────────────────────────
# Networks
# ──────────────────────────────────────────────────────────────────────────
networks:
  todo-network:
    driver: bridge
