apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-api
  namespace: todo
  labels:
    app: todo-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-api
  template:
    metadata:
      labels:
        app: todo-api
    spec:
      # Wait for MongoDB to be ready before starting the app pod
      initContainers:
        - name: wait-for-mongo
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until nc -z mongo-service 27017; do
                echo "Waiting for MongoDB at mongo-service:27017..."
                sleep 3
              done
              echo "MongoDB is reachable."

      containers:
        - name: todo-api
          image: prashantsharma288/todo-api:1.0.0
          # IfNotPresent uses the locally built image (Docker Desktop shares the daemon)
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            # Override application.properties MongoDB URI with the in-cluster service hostname
            - name: SPRING_DATA_MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: uri
          envFrom:
            - configMapRef:
                name: todo-api-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
